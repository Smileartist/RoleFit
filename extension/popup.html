<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; font-family: 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9; padding: 1.25rem;
    }
    .header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .header h1 {
      font-size: 1.125rem; font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .form, .panel { display: flex; flex-direction: column; gap: 0.75rem; }
    input {
      padding: 0.5rem 0.75rem; background: #1e293b; border: 1px solid #334155;
      border-radius: 0.5rem; color: #f1f5f9; font-size: 0.875rem; outline: none;
    }
    input:focus { border-color: #6366f1; }
    .btn-primary {
      padding: 0.5rem 1rem; background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border: none; border-radius: 0.5rem; font-weight: 600;
      font-size: 0.8125rem; cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      padding: 0.5rem 0.75rem; background: #1e293b; color: #f1f5f9;
      border: 1px solid #334155; border-radius: 0.5rem; font-size: 0.8125rem;
      cursor: pointer; text-decoration: none; text-align: center;
    }
    .alert-error {
      padding: 0.5rem; background: rgba(239,68,68,0.12); color: #ef4444;
      border-radius: 0.375rem; font-size: 0.8125rem;
    }
    .alert-success {
      padding: 0.5rem; background: rgba(34,197,94,0.12); color: #22c55e;
      border-radius: 0.375rem; font-size: 0.8125rem;
    }
    .job-card {
      background: #1e293b; border-radius: 0.5rem; padding: 0.75rem; font-size: 0.8125rem;
    }
    .job-title { font-weight: 700; margin-bottom: 0.25rem; }
    .job-company { color: #818cf8; margin-bottom: 0.25rem; }
    .job-desc { color: #94a3b8; }
    .row { display: flex; gap: 0.5rem; }
    .muted { font-size: 0.8125rem; color: #94a3b8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:1.5rem">🎯</span>
    <h1>RoleFit</h1>
  </div>

  <!-- Login Form -->
  <div id="loginSection" class="form">
    <p class="muted">Sign in to your RoleFit account</p>
    <div id="loginError" class="alert-error hidden"></div>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button id="loginBtn" class="btn-primary">Sign In</button>
  </div>

  <!-- Main Panel -->
  <div id="mainSection" class="panel hidden">
    <div id="mainError" class="alert-error hidden"></div>
    <div id="mainStatus" class="alert-success hidden"></div>
    <button id="extractBtn" class="btn-primary">🔍 Extract Job from Page</button>
    <div id="jobCard" class="job-card hidden">
      <div id="jobTitle" class="job-title"></div>
      <div id="jobCompany" class="job-company"></div>
      <div id="jobDesc" class="job-desc"></div>
    </div>
    <button id="sendBtn" class="btn-primary hidden">✨ Send to RoleFit & Tailor Resume</button>
    <div class="row">
      <a id="dashLink" href="http://localhost:3000/dashboard" target="_blank" class="btn-secondary" style="flex:1">Open Dashboard</a>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
